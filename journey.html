<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Pick a Heart</title>
    <link
      href="https://fonts.googleapis.com/css2?family=Dancing+Script:wght@600&display=swap"
      rel="stylesheet"
    />
    <link rel="stylesheet" href="journey.css" />
  </head>
  <body>
    <!-- ========== MAIN GRID PAGE ========== -->
    <div id="page-main" class="page active">
      <div class="bg-deco">
        <img src="Images/breadlock.png" class="deco-img d1" alt="" />
        <img src="Images/breadlock.png" class="deco-img d2" alt="" />
        <img src="Images/breadlock.png" class="deco-img d3" alt="" />
        <img src="Images/breadlock.png" class="deco-img d4" alt="" />
        <img src="Images/starblue.png" class="deco-img s1" alt="" />
        <img src="Images/stargreen.png" class="deco-img s2" alt="" />
        <img src="Images/starblue.png" class="deco-img s3" alt="" />
        <img src="Images/stargreen.png" class="deco-img s4" alt="" />
      </div>

      <h1 class="main-title">Pick a heart</h1>

      <div class="calendar-wrap">
        <img src="Images/calendar.png" class="calendar-bg" alt="calendar" />
        <div class="heart-grid" id="heartGrid"></div>
      </div>

      <p class="more-to-come">✨ more to come! ✨</p>
    </div>

    <!-- ========== GALLERY OVERLAY (shared across all memories) ========== -->
    <div
      id="galleryOverlay"
      class="gallery-overlay"
      onclick="handleOverlayClick(event)"
    >
      <div class="gallery-modal">
        <button class="gallery-close" onclick="closeGallery()">✕</button>
        <h2 class="gallery-title" id="galleryTitle"></h2>
        <div class="gallery-grid" id="galleryGrid"></div>
      </div>
    </div>

    <!-- ========== LIGHTBOX (full-screen single photo) ========== -->
    <div id="lightbox" class="lightbox" onclick="closeLightbox()">
      <img id="lightboxImg" src="" alt="Photo" />
    </div>

    <!-- ========== VIDEO POPUP PLAYER ========== -->
    <div
      id="videoPopup"
      class="video-popup"
      onclick="handleVideoPopupClick(event)"
    >
      <div class="video-popup-modal">
        <div class="video-popup-header">
          <span class="video-popup-title" id="popupVideoTitle"></span>
          <button class="video-popup-close" onclick="closeVideoPopup()">
            ✕
          </button>
        </div>
        <div class="video-popup-screen">
          <video
            id="popupVideo"
            controls
            controlsList="nodownload"
            playsinline
          ></video>
        </div>
      </div>
    </div>

    <!-- Memory pages injected by JS -->
    <script src="journey.js"></script>
  </body>
</html>
